<!doctype html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Album Player</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: 'var(--color-primary)',
            accent: 'var(--color-accent)',
            background: 'var(--color-background)',
            surface: 'var(--color-surface)',
            text: 'var(--color-text)',
            muted: 'var(--color-text-muted)',
            border: 'var(--color-border)'
          },
          fontFamily: {
            sans: ['var(--font-body)', 'sans-serif'],
            heading: ['var(--font-heading)', 'sans-serif'],
            mono: ['var(--font-mono)', 'monospace']
          },
          borderRadius: {
            'custom': 'var(--radius-md)'
          },
          boxShadow: {
            'custom': 'var(--shadow-md)'
          }
        }
      }
    };
  </script>

  <link rel="stylesheet" href="/css/vars.css" />
  <style id="dynamic-theme"></style>
</head>

<body class="album-renderer-root min-h-screen">
  <main id="album-root"
    class="w-full max-w-[var(--container-max-width)] mx-auto p-4 md:p-8 space-y-[var(--section-gap)]">

    <!-- Hero / Header Section -->
    <header id="section-hero" class="space-y-4 text-center">
      <div class="flex justify-center">
        <img id="album-logo" src="" alt="Logo" class="max-h-16 w-auto hidden object-contain" />
      </div>
      <div>
        <h1 id="album-title" class="text-3xl md:text-5xl font-bold text-text min-h-[1.2em]" data-label="brandingTitle">
        </h1>
        <p id="artist-name" class="text-lg md:text-xl text-muted font-medium min-h-[1.2em]" data-label="brandingSub">
        </p>
      </div>
    </header>

    <!-- App Views Container -->
    <div id="view-container" class="relative overflow-hidden min-h-[400px]">

      <!-- Check-in / Welcome View -->
      <div id="view-checkin" class="view-panel active p-6 text-center space-y-6">
        <h2 class="text-2xl font-bold" data-label="welcomeTitle">Seja bem-vindo</h2>
        <p class="text-muted" data-label="welcomeSubtitle">Insira seu nome para começar.</p>
        <form id="checkin-form" class="max-w-sm mx-auto space-y-4">
          <input type="text" id="input-passenger" placeholder="Seu nome" required
            class="w-full bg-surface border border-border rounded-custom p-3 focus:ring-2 focus:ring-accent outline-none text-center uppercase" />
          <button type="submit"
            class="w-full bg-primary text-background font-bold py-3 rounded-custom shadow-custom hover:opacity-90 transition-opacity">
            <span data-label="cta">Entrar</span>
          </button>
          <button type="button" id="btn-skip-checkin" class="text-sm text-muted underline block mx-auto">
            <span data-label="skipCheckin">Pular</span>
          </button>
        </form>
      </div>

      <!-- Loading State -->
      <div id="view-loading" class="view-panel hidden p-10 flex flex-col items-center justify-center space-y-4">
        <div class="animate-spin rounded-full h-10 w-10 border-b-2 border-primary"></div>
        <p class="text-muted font-mono text-sm uppercase" data-label="loadingMsg">Buscando faixas...</p>
      </div>

      <!-- Tracklist View -->
      <div id="view-tracklist" class="view-panel hidden space-y-6">
        <div class="flex justify-between items-baseline border-b border-border pb-2">
          <h2 class="text-xl font-bold uppercase tracking-tight" data-label="tracklistTitle">Músicas</h2>
          <span class="text-xs font-mono text-muted"><span id="track-count">--</span> <span
              data-label="tracklistUnit">Músicas</span></span>
        </div>
        <ul id="tracklist-container" class="space-y-3">
          <!-- Tracks injected via JS -->
        </ul>
      </div>

      <!-- Lyrics / Player View -->
      <div id="view-lyrics" class="view-panel hidden space-y-8">
        <button id="btn-back"
          class="flex items-center gap-2 text-primary font-bold text-sm uppercase hover:opacity-70 transition-opacity">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
          </svg>
          <span data-label="backBtn">Voltar</span>
        </button>

        <header class="border-l-4 border-accent pl-4 py-1">
          <h3 id="lyrics-title" class="text-3xl font-bold text-text uppercase leading-tight">Música</h3>
        </header>

        <div id="media-container" class="hidden">
          <div id="media-players" class="w-full rounded-custom overflow-hidden shadow-sm"></div>
        </div>

        <div id="lyrics-content" class="text-lg leading-relaxed whitespace-pre-wrap text-text"></div>

        <!-- Social / Ratings -->
        <div class="bg-surface border border-border p-6 rounded-custom flex flex-col items-center gap-6 shadow-sm">
          <div class="flex items-center justify-around w-full">
            <div class="text-center">
              <button id="btn-likeTrack" class="text-muted hover:text-red-500 transition-colors">
                <svg class="w-10 h-10" fill="currentColor" viewBox="0 0 24 24">
                  <path
                    d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                </svg>
              </button>
              <p id="like-count" class="text-xs font-bold font-mono mt-1 text-muted">0</p>
            </div>
            <div class="flex flex-col items-center border-l border-border pl-8">
              <div id="star-rating-container" class="flex gap-1">
                <!-- Stars injected via JS -->
              </div>
              <p id="rating-avg" class="text-[10px] font-mono mt-2 text-muted">Média: --</p>
            </div>
          </div>
        </div>

        <!-- Navigation -->
        <div class="flex justify-between items-center py-4 border-t border-border">
          <button id="btn-prev-track"
            class="flex items-center gap-2 text-muted font-bold text-xs uppercase hover:text-primary">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
            <span data-label="prev">Anterior</span>
          </button>
          <button id="btn-next-track"
            class="flex items-center gap-2 text-primary font-bold text-xs uppercase hover:opacity-70">
            <span data-label="next">Próxima</span>
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="mt-12 pt-8 border-t border-dashed border-border text-center space-y-2 pb-10">
      <p class="font-mono text-[10px] text-muted uppercase tracking-widest" data-label="footerThanks">Obrigado pela
        visita</p>
      <p class="text-[10px] text-muted">
        <span data-label="brandingTitle">Álbum</span> - <span data-label="brandingSub">Artista</span>
      </p>
    </footer>
  </main>

  <script type="module" src="/js/app.js"></script>
</body>

</html>
